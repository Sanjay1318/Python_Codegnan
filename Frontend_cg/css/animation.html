<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            width: 40%;
            height: 300px;
            background-color: orangered;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto;
        }
        p {
            background-color: grey;
            padding: 20px;
            transition: transform 0.5s linear;
        }
        p:hover {
            /* transform: translate(30px, 30px);
            transform: rotate(360deg);
            transform: scale(1.2);  */
            transform: skew(30deg);
        }
        .ball{
            background-color: greenyellow;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            animation: bounce 1.5s linear infinite;
            position: absolute
        }
        @keyframes bounce{
            0%{
                top:0px
            }
            50%{
                top: 50%;
                /* transform: translate(350px); */
            }
            100%{
                top:0%
            }
        }
    </style>
</head>
<body>
    <!-- <div class="container">
        <p><span style="color: aqua;">Hello!</span> <br> This is hover</p>
    </div> -->
    <div class="ball"></div>
</body>
</html>
