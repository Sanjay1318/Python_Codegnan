<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>randompassword</title>
</head>
<body>
    <script>
        passwordList = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$*-",password = []
        // console.log(passwordList.length)
        // console.log(Math.floor(Math.random()*17)) // gives a random number between the range from 0 to the number-1 we multiply, here 0 to (17-1)
        // console.log(passwordList.charAt(26))
        for(i=1;i<=8;i++){
            var RandomNumber = Math.floor(Math.random()*passwordList.length)
            var RandomCharacter = passwordList.charAt(RandomNumber)
            // console.log(RandomCharacter)
            password.push(RandomCharacter)
        }
        password = password.join("")
        console.log(password)
    </script>
</body>
</html>
